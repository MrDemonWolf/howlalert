name = "howlalert-worker"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "HOWLALERT_DEVICES"
id = "placeholder_kv_id"

[[d1_databases]]
binding = "DB"
database_name = "howlalert-db"
database_id = "placeholder_d1_id"

[vars]
ENVIRONMENT = "development"

[observability]
enabled = true

[env.production]
name = "howlalert-worker"

[[env.production.kv_namespaces]]
binding = "HOWLALERT_DEVICES"
id = "placeholder_kv_id_prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "howlalert-db"
database_id = "placeholder_d1_id_prod"

[env.production.vars]
ENVIRONMENT = "production"
