name: HowlAlert
options:
  bundleIdPrefix: com.mrdemonwolf.howlalert
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  HowlAlertKit:
    path: ../../packages/howlalert-kit

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  HowlAlert:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: YES
        CFBundleDisplayName: HowlAlert
        CFBundleShortVersionString: "0.0.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 MrDemonWolf, Inc."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.howlalert.mac
        PRODUCT_NAME: HowlAlert
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: HowlAlertKit
        product: HowlAlertKit
