name: HowlAlert
options:
  bundleIdPrefix: com.mrdemonwolf
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  HowlAlertKit:
    path: ../../packages/HowlAlertKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  HowlAlert:
    type: application
    platform: macOS
    sources:
      - path: HowlAlert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.howlalert.mac
        INFOPLIST_FILE: HowlAlert/Info.plist
        CODE_SIGN_ENTITLEMENTS: HowlAlert/HowlAlert.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        ENABLE_APP_SANDBOX: false
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    dependencies:
      - package: HowlAlertKit
      - package: Sparkle
        product: Sparkle
