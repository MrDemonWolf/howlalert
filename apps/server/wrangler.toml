name = "howlalert-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "howlalert"
database_id = "placeholder-run-wrangler-d1-create-howlalert"

[[kv_namespaces]]
binding = "HOWLALERT_DEVICES"
id = "placeholder-run-wrangler-kv-create-HOWLALERT_DEVICES"

[[kv_namespaces]]
binding = "HOWLALERT_PUSH_LOG"
id = "placeholder-run-wrangler-kv-create-HOWLALERT_PUSH_LOG"

[vars]
WORKER_VERSION = "2.0.0"

# Secrets (set via: wrangler secret put <NAME>)
# APNS_AUTH_KEY    — PKCS#8 PEM private key (.p8 file contents)
# APNS_KEY_ID      — 10-char key ID from Apple Developer portal
# APNS_TEAM_ID     — 10-char team ID from Apple Developer portal
# REVENUECAT_WEBHOOK_SECRET — webhook signing secret from RC dashboard
