name: HowlAlert
options:
  bundleIdPrefix: com.mrdemonwolf
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  HowlAlertKit:
    path: ../../packages/HowlAlertKit
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"

targets:
  HowlAlert:
    type: application
    platform: iOS
    sources:
      - HowlAlert
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.howlalert
        INFOPLIST_FILE: HowlAlert/Info.plist
        CODE_SIGN_ENTITLEMENTS: HowlAlert/HowlAlert.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: HowlAlertKit
      - package: RevenueCat
        product: RevenueCat
      - target: HowlAlertWatch
    entitlements:
      path: HowlAlert/HowlAlert.entitlements

  HowlAlertWatch:
    type: application
    platform: watchOS
    sources:
      - HowlAlertWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.howlalert.watchkitapp
        INFOPLIST_FILE: HowlAlertWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: HowlAlertWatch/HowlAlertWatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
    dependencies:
      - package: HowlAlertKit
