name: HowlAlertWatch
options:
  bundleIdPrefix: com.mrdemonwolf.howlalert
  deploymentTarget:
    watchOS: "11.0"
  createIntermediateGroups: true

packages:
  HowlAlertKit:
    path: ../../packages/howlalert-kit

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  HowlAlertWatch:
    type: application
    platform: watchOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: HowlAlert
        CFBundleShortVersionString: "0.0.0"
        CFBundleVersion: "1"
        WKApplication: YES
        WKWatchOnly: NO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mrdemonwolf.howlalert.watchkitapp
        PRODUCT_NAME: HowlAlertWatch
        TARGETED_DEVICE_FAMILY: "4"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: HowlAlertKit
        product: HowlAlertKit
