name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 -d > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build + archive
        run: make build-macos ARCHIVE=YES

      - name: Export app from archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/HowlAlert.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist apps/macos/ExportOptions.plist

      - name: Create branded DMG
        run: npx create-dmg "build/HowlAlert.app" --overwrite --dmg-title="HowlAlert" build/

      - name: Rename DMG
        run: mv build/*.dmg build/HowlAlert.dmg

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit build/HowlAlert.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple build/HowlAlert.dmg

      - name: Sign Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          # Sparkle sign_update outputs signature to stdout
          echo "sparkle-signature=$(./bin/sign_update build/HowlAlert.dmg -f /tmp/sparkle_key)" >> build/appcast-signature.txt
          rm /tmp/sparkle_key

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/HowlAlert.dmg
            build/appcast-signature.txt
          generate_release_notes: true

      - name: Compute SHA256 for Homebrew
        id: sha
        run: echo "sha=$(shasum -a 256 build/HowlAlert.dmg | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Dispatch Homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_DEN_TOKEN }}
          repository: mrdemonwolf/homebrew-den
          event-type: howlalert-release
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "sha256": "${{ steps.sha.outputs.sha }}",
              "url": "https://github.com/mrdemonwolf/howlalert/releases/download/${{ github.ref_name }}/HowlAlert.dmg"
            }
