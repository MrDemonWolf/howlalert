name: Update License Year

on:
  schedule:
    # Midnight CST (UTC-6) on January 1st = 6:00 AM UTC
    - cron: "0 6 1 1 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-year:
    name: Update MIT License Year
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update copyright year
        run: |
          CURRENT_YEAR=$(date +%Y)
          sed -i "s/Copyright (c) [0-9]\{4\} MrDemonWolf/Copyright (c) ${CURRENT_YEAR} MrDemonWolf/" LICENSE

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update license year to ${{ github.event.repository.updated_at && '' }}$(date +%Y)"
          title: "chore: update MIT license year to $(date +%Y)"
          body: |
            Automated annual update of the copyright year in the MIT license.

            🤖 Generated by GitHub Actions
          branch: chore/update-license-year
          delete-branch: true
