name: CI — Swift

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  swift-package:
    name: HowlAlertKit — build + test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build HowlAlertKit
        run: swift build --package-path packages/howlalert-kit

      - name: Test HowlAlertKit
        run: swift test --package-path packages/howlalert-kit

  xcode-apps:
    name: Xcode apps — generate + build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode projects
        run: make xcodegen

      - name: Build macOS app
        run: |
          xcodebuild \
            -project apps/macos/HowlAlert.xcodeproj \
            -scheme HowlAlert \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build iOS app
        run: |
          xcodebuild \
            -project apps/ios/HowlAlert.xcodeproj \
            -scheme HowlAlert \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build watchOS app
        run: |
          xcodebuild \
            -project apps/watchos/HowlAlertWatch.xcodeproj \
            -scheme HowlAlertWatch \
            -destination 'generic/platform=watchOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
